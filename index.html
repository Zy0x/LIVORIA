    <!-- ═══ iOS PWA ═══ -->

    <link rel="apple-touch-icon" sizes="96x96"   href="/icons/icon-96x96.png" />
    <link rel="apple-touch-icon"                 href="/icons/icon-192x192.png" />

    <!-- ═══ Favicon ═══ -->
    <link rel="icon" type="image/png" href="/icons/icon-512x512.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="96x96"   href="/icons/icon-96x96.png" />

    <!-- ═══ Windows / Microsoft ═══ -->
    <meta name="msapplication-TileColor" content="#2d5040" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="msapplication-config"    content="none" />

    <!-- ═══ SEO & Social ═══ -->
    <meta name="description" content="LIVORIA — Personal archive app untuk tagihan, anime, donghua, waifu, dan obat-obatan.">
    <meta name="application-name" content="LIVORIA" />
    
    
    <meta property="og:type"        content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png">
    <meta name="twitter:card"        content="summary" />
    
    
    <meta name="twitter:image" content="/icons/icon-512x512.png">

    <!-- ═══ Performance: preconnect fonts ═══ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      ═══ CRITICAL: PWA Install Prompt Capture ═══
      
      Must be in <head> BEFORE any other scripts.
      'beforeinstallprompt' can fire BEFORE React bundle loads.
      Capturing early in inline script ensures we never miss it.
    -->
    <script>
      // Global PWA state — available before React loads
      window.__pwa_deferred_prompt   = null;
      window.__pwa_prompt_available  = false;
      window.__pwa_installed         = false;

      // Capture install prompt ASAP
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwa_deferred_prompt  = e;
        window.__pwa_prompt_available = true;
        // Notify React if it's already mounted
        window.dispatchEvent(new CustomEvent('pwa_prompt_ready', { detail: { prompt: e } }));
        console.log('[PWA] beforeinstallprompt captured ✓');
      }, { once: false });

      // Track app installed state
      window.addEventListener('appinstalled', function() {
        window.__pwa_installed = true;
        window.__pwa_deferred_prompt = null;
        window.dispatchEvent(new CustomEvent('pwa_installed'));
        console.log('[PWA] App installed ✓');
      });

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/', updateViaCache: 'none' })
            .then(function(reg) {
              console.log('[PWA] SW registered, scope:', reg.scope);
              
              // Check for updates every 60s when app is active
              setInterval(function() {
                reg.update().catch(function() {});
              }, 60 * 1000);
            })
            .catch(function(err) {
              console.warn('[PWA] SW registration failed:', err);
            });

          // Listen for SW messages
          navigator.serviceWorker.addEventListener('message', function(event) {
            if (event.data?.type === 'SYNC_COMPLETE') {
              console.log('[PWA] Background sync complete');
            }
          });

          // Handle SW updates
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            console.log('[PWA] New SW controller active');
          });
        });
      }
    </script>
    
  
  
  
  
  
  
  
  <meta property="og:title" content="LIVORIA">
  <meta name="twitter:title" content="LIVORIA">
  <meta property="og:description" content="LIVORIA — Personal archive app untuk tagihan, anime, donghua, waifu, dan obat-obatan.">
  <meta name="twitter:description" content="LIVORIA — Personal archive app untuk tagihan, anime, donghua, waifu, dan obat-obatan.">
</head>
