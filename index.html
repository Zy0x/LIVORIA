    <!--
      ═══ CRITICAL: PWA Install Prompt — HARUS di sini, SEBELUM semua script lain ═══
      
      Alasan: event 'beforeinstallprompt' bisa fire SEBELUM React/Vite bundle selesai dimuat.
      Jika listener baru dipasang di dalam React component/hook, event sudah lewat dan
      tidak bisa di-capture lagi. Solusi: tangkap di inline script di <head>.
      
      Ini adalah pola yang sama dengan SIPENA (project referensi yang berhasil).
    -->
    <script>
      // Inisialisasi storage global untuk prompt — tersedia sebelum apapun load
      window.__pwa_deferred_prompt = null;
      window.__pwa_prompt_available = false;

      // Tangkap event SEDINI MUNGKIN
      window.addEventListener('beforeinstallprompt', function(e) {
        // Cegah Chrome menampilkan mini-infobar otomatis
        e.preventDefault();
        
        // Simpan event untuk dipakai nanti oleh React component
        window.__pwa_deferred_prompt = e;
        window.__pwa_prompt_available = true;
        
        console.log('[PWA] beforeinstallprompt captured early in index.html ✓');
        
        // Dispatch custom event agar React hook yang sudah mount bisa bereaksi
        window.dispatchEvent(new CustomEvent('pwa_prompt_ready'));
      });

      // Register service worker setelah page load
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(reg) {
              console.log('[PWA] SW registered:', reg.scope);
            })
            .catch(function(err) {
              console.warn('[PWA] SW registration failed:', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
