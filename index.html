<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LIVORIA</title>
    
    <!-- PWA manifest — WAJIB ada di head -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme color untuk browser chrome -->
    <meta name="theme-color" content="#2d5040" />
    
    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LIVORIA" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32"  href="/icons/icon-96x96.png" />
    
    <!-- Open Graph (opsional tapi bagus) -->
    <meta property="og:title" content="LIVORIA" />
    <meta property="og:description" content="Personal archive app untuk tagihan, anime, donghua, waifu, dan obat-obatan." />
    <meta property="og:type" content="website" />
    
    <!-- Cegah cache masalah di development -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
