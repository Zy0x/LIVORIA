name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Sync from forward-master"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-worker-${{ github.event_name }}-${{ github.event.workflow_run.head_branch || github.ref_name || 'main' }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish Worker proxy
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Deploy with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not configured. Worker deploy cannot run."
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is not configured. Worker deploy cannot run."
            exit 1
          fi

          npx --yes wrangler@4 deploy --config wrangler.jsonc
