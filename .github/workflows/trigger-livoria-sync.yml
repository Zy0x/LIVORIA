name: Trigger LIVORIA sync

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    name: Notify Zy0x/LIVORIA
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch target sync workflow
        env:
          LIVORIA_SYNC_TOKEN: ${{ secrets.LIVORIA_SYNC_TOKEN }}
          TARGET_REPOSITORY: Zy0x/LIVORIA
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "$SOURCE_REPOSITORY" = "$TARGET_REPOSITORY" ]; then
            echo "Repository ini sudah target publish; dispatch sync dilewati."
            exit 0
          fi

          if [ -z "${LIVORIA_SYNC_TOKEN:-}" ]; then
            echo "Secret LIVORIA_SYNC_TOKEN belum dikonfigurasi di repo source."
            exit 1
          fi

          payload="$(jq -n \
            --arg event_type "forward-master-updated" \
            --arg source_repository "$SOURCE_REPOSITORY" \
            --arg source_branch "$SOURCE_BRANCH" \
            --arg source_sha "$SOURCE_SHA" \
            '{
              event_type: $event_type,
              client_payload: {
                source_repository: $source_repository,
                source_branch: $source_branch,
                source_sha: $source_sha,
                dry_run: "false"
              }
            }')"

          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${LIVORIA_SYNC_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_REPOSITORY}/dispatches" \
            -d "$payload"
